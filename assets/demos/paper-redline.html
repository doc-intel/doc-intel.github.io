n order for the model to make use of the order of the sequence, we must inject some information about the relative or absolute position of the tokens in the sequence. To this end, we add &quot;positional encodings&quot;", "text_a": "transformation.", "text_b": "transformation, similar to [30].", "impact": "", "comment": ""}, {"kind": "changed", "old_page": 5, "new_page": 6, "left": "<del>ﬁxed</del>", "right": "<ins>fixed</ins>", "unified": "<del>ﬁxed</del> <ins>fixed</ins>", "ctx_before": "information about the relative or absolute position of the tokens in the sequence. To this end, we add &quot;positional encodings&quot; to the input embeddings at the bottoms of the encoder and decoder stacks. The positional encodings have the same dimension dmodel as the embeddings, so that the two can be summed. There are many choices of positional encodings, learned and", "ctx_after": "[9]. In this work, we use sine and cosine functions of different frequencies: PE(pos,2i) = sin(pos/100002i/dmodel) PE(pos,2i+1) = cos(pos/100002i/dmodel) where pos is the position and i is the dimension. That is, each dimension of the positional encoding corresponds to a sinusoid. The wavelengths form a geometric progression from 2π to 10000 · 2π. We chose this function because we hypothesized", "text_a": "ﬁxed", "text_b": "fixed", "impact": "", "comment": ""}, {"kind": "changed", "old_page": 5, "new_page": 6, "left": "<del>ﬁxed</del>", "right": "<ins>fixed</ins>", "unified": "<del>ﬁxed</del> <ins>fixed</ins>", "ctx_before": "PE(pos,2i+1) = cos(pos/100002i/dmodel) where pos is the position and i is the dimension. That is, each dimension of the positional encoding corresponds to a sinusoid. The wavelengths form a geometric progression from 2π to 10000 · 2π. We chose this function because we hypothesized it would allow the model to easily learn to attend by relative positions, since for any", "ctx_after": "offset k, PEpos+k can be represented as a linear function of PEpos. Why Self-Attention In this section we compare various aspects of self-attention layers to the recurrent and convolutional layers commonly used for mapping one variable-length sequence of symbol representations Table 1: Maximum path lengths, per-layer complexity and minimum number of sequential operations for different layer types. n is the", "text_a": "ﬁxed", "text_b": "fixed", "impact": "", "comment": ""}, {"kind": "added", "old_page": 5, "new_page": 6, "left": "", "right": "<ins>We also experimented with using learned positional embeddings [9] instead, and found that the two versions produced nearly identical results (see Table 3 row (E)). We chose the sinusoidal version because it may allow the model to extrapolate to sequence lengths longer than the ones encountered during training.</ins>", "unified": "<ins>We also experimented with using learned positional embeddings [9] instead, and found that the two versions produced nearly identical results (see Table 3 row (E)). We chose the sinusoidal version because it may allow the model to extrapolate to sequence lengths longer than the ones encountered during training.</ins>", "ctx_before": "That is, each dimension of the positional encoding corresponds to a sinusoid. The wavelengths form a geometric progression from 2π to 10000 · 2π. We chose this function because we hypothesized it would allow the model to easily learn to attend by relative positions, since for any ﬁxed offset k, PEpos+k can be represented as a linear function of PEpos.", "ctx_after": "Why Self-Attention In this section we compare various aspects of self-attention layers to the recurrent and convolutional layers commonly used for mapping one variable-length sequence of symbol representations Table 1: Maximum path lengths, per-layer complexity and minimum number of sequential operations for different layer types. n is the sequence length, d is the representation dimension, k is the kernel size", "text_a": "", "text_b": "We also experimented with using learned positional embeddings [9] instead, and found that the two versions produced nearly identical results (see Table 3 row (E)). We chose the sinusoidal version because it may allow the model to extrapolate to sequence lengths longer than the ones encountered during training.", "impact": "", "comment": ""}, {"kind": "moved", "old_page": 6, "new_page": 6, "left": "Table 1: Maximum path lengths, per-layer complexity and minimum number of sequential operations for different layer types. n is the sequence length, d is the representation dimension, k is the kernel size of convolutions and r the size of the neighborhood in restricted self-attention. Layer Type Complexity per Layer Sequential Maximum Path Length Operations Self-Attention O(n2 · d) O(1) O(1) Recurrent O(n · d2) O(n) O(n) Convolutional O(k · n · d2) O(1) O(logk(n)) Self-Attention (restricted) O(r · n · d) O(1) O(n/r)", "right": "Table 1: Maximum path lengths, per-layer complexity and minimum number of sequential operations for different layer types. n is the sequence length, d is the representation dimension, k is the kernel size of convolutions and r the size of the neighborhood in restricted self-attention. Layer Type Complexity per Layer Sequential Maximum Path Length Operations Self-Attention O(n2 · d) O(1) O(1) Recurrent O(n · d2) O(n) O(n) Convolutional O(k · n · d2) O(1) O(logk(n)) Self-Attention (restricted) O(r · n · d) O(1) O(n/r)", "unified": "Table 1: Maximum path lengths, per-layer complexity and minimum number of sequential operations for different layer types. n is the sequence length, d is the representation dimension, k is the kernel size of convolutions and r the size of the neighborhood in restricted self-attention. Layer Type Complexity per Layer Sequential Maximum Path Length Operations Self-Attention O(n2 · d) O(1) O(1) Recurrent O(n · d2) O(n) O(n) Convolutional O(k · n · d2) O(1) O(logk(n)) Self-Attention (restricted) O(r · n · d) O(1) O(n/r)", "ctx_before": "because we hypothesized it would allow the model to easily learn to attend by relative positions, since for any ﬁxed offset k, PEpos+k can be represented as a linear function of PEpos. Why Self-Attention In this section we compare various aspects of self-attention layers to the recurrent and convolutional layers commonly used for mapping one variable-length sequence of symbol representations", "ctx_after": "(x1, ..., xn) to another sequence of equal length (z1, ..., zn), with xi, zi ∈Rd, such as a hidden layer in a typical sequence transduction encoder or decoder. Motivating our use of self-attention we consider three desiderata. One is the total computational complexity per layer. Another is the amount of computation that can be parallelized, as measured by the", "text_a": "Table 1: Maximum path lengths, per-layer complexity and minimum number of sequential operations for different layer types. n is the sequence length, d is the representation dimension, k is the kernel size of convolutions and r the size of the neighborhood in restricted self-attention. Layer Type Complexity per Layer Sequential Maximum Path Length Operations Self-Attention O(n2 · d) O(1) O(1) Recurrent O(n · d2) O(n) O(n) Convolutional O(k · n · d2) O(1) O(logk(n)) Self-Attention (restricted) O(r · n · d) O(1) O(n/r)", "text_b": "Table 1: Maximum path lengths, per-layer complexity and minimum number of sequential operations for different layer types. n is the sequence length, d is the representation dimension, k is the kernel size of convolutions and r the size of the neighborhood in restricted self-attention. Layer Type Complexity per Layer Sequential Maximum Path Length Operations Self-Attention O(n2 · d) O(1) O(1) Recurrent O(n · d2) O(n) O(n) Convolutional O(k · n · d2) O(1) O(logk(n)) Self-Attention (restricted) O(r · n · d) O(1) O(n/r)", "impact": "", "comment": ""}, {"kind": "pagination", "old_page": 6, "new_page": 6, "left": "<del>[11].</del>", "right": "<ins>[12].</ins>", "unified": "<del>[11].</del> <ins>[12].</ins>", "ctx_before": "long-range dependencies is a key challenge in many sequence transduction tasks. One key factor affecting the ability to learn such dependencies is the length of the paths forward and backward signals have to traverse in the network. The shorter these paths between any combination of positions in the input and output sequences, the easier it is to learn long-range dependencies", "ctx_after": "Hence we also compare the maximum path length between any two input and output positions in networks composed of the different layer types. As noted in Table 1, a self-attention layer connects all positions with a constant number of sequentially executed operations, whereas a recurrent layer requires O(n) sequential operations. In terms of computational complexity, self-attention layers are faster than", "text_a": "[11].", "text_b": "[12].", "impact": "", "comment": ""}, {"kind": "pagination", "old_page": 6, "new_page": 7, "left": "<del>[34]</del> and byte-pair <del>[28]</del>", "right": "<ins>[38]</ins> and byte-pair <ins>[31]</ins>", "unified": "<del>[34]</del> <ins>[38]</ins> and byte-pair <del>[28]</del> <ins>[31]</ins>", "ctx_before": "positions with a constant number of sequentially executed operations, whereas a recurrent layer requires O(n) sequential operations. In terms of computational complexity, self-attention layers are faster than recurrent layers when the sequence length n is smaller than the representation dimensionality d, which is most often the case with sentence representations used by state-of-the-art models in machine translations, such as word-piece", "ctx_after": "representations. To improve computational performance for tasks involving very long sequences, self-attention could be restricted to considering only a neighborhood of size r in the input sequence centered around the respective output position. This would increase the maximum path length to O(n/r). We plan to investigate this approach further in future work. A single convolutional layer with  training regime for our models. 5.1 Training", "text_a": "beneﬁt,", "text_b": "benefit,", "impact": "", "comment": ""}, {"kind": "changed", "old_page": 6, "new_page": 7, "left": "<del>signiﬁcantly</del>", "right": "<ins>significantly</ins>", "unified": "<del>signiﬁcantly</del> <ins>significantly</ins>", "ctx_before": "syntactic and semantic structure of the sentences. Training This section describes the training regime for our models. 5.1 Training Data and Batching We trained on the standard WMT 2014 English-German dataset consisting of about 4.5 million sentence pairs. Sentences were encoded using byte-pair encoding [3], which has a shared sourcetarget vocabulary of about 37000 tokens. For English-French, we used the", "ctx_after": "larger WMT 2014 English-French dataset consisting of 36M sentences and split tokens into a 32000 word-piece vocabulary [34]. Sentence pairs were batched together by approximate sequence length. Each training batch contained a set of sentence pairs containing approximately 25000 source tokens and 25000 target tokens. 5.2 Hardware and Schedule We trained our models on one machine with 8 NVIDIA P100", "text_a": "signiﬁcantly", "text_b": "significantly", "impact": "", "comment": ""}, {"kind": "pagination", "old_page": 7, "new_page": 7, "left": "<del>[34].</del>", "right": "<ins>[38].</ins>", "unified": "<del>[34].</del> <ins>[38].</ins>", "ctx_before": "Training Data and Batching We trained on the standard WMT 2014 English-German dataset consisting of about 4.5 million sentence pairs. Sentences were encoded using byte-pair encoding [3], which has a shared sourcetarget vocabulary of about 37000 tokens. For English-French, we used the signiﬁcantly larger WMT 2014 English-French dataset consisting of 36M sentences and split tokens into a 32000 word-piece vocabulary", "ctx_after": "Sentence pairs were batched together by approximate sequence length. Each training batch contained a set of sentence pairs containing approximately 25000 source tokens and 25000 target tokens. 5.2 Hardware and Schedule We trained our models on one machine with 8 NVIDIA P100 GPUs. For our base models using the hyperparameters described throughout the paper, each training step took about 0.4", "text_a": "[34].", "text_b": "[38].", "impact": "", "comment": ""}, {"kind": "changed", "old_page": 7, "new_page": 7, "left": "<del>seconds, and the</del> models were trained for 300,000 steps <del>or 3.5 days.</del>", "right": "<ins>seconds. The big</ins> models were trained for 300,000 steps <ins>(3.5 days).</ins>", "unified": "<del>seconds, and the</del> <ins>seconds. The big</ins> models were trained for 300,000 steps <del>or 3.5 days.</del> <ins>(3.5 days).</ins>", "ctx_before": "Schedule We trained our models on one machine with 8 NVIDIA P100 GPUs. For our base models using the hyperparameters described throughout the paper, each training step took about 0.4 seconds. We trained the base models for a total of 100,000 steps or 12 hours. For our big models,(described on the bottom line of table 3), step time was 1.0", "ctx_after": "5.3 Optimizer We used the Adam optimizer [18] with β1 = 0.9, β2 = 0.98 and ϵ = 10−9. We varied the learning rate over the course of training, according to the formula: lrate = d−0.5 model · min(step_num−0.5, step_num · warmup_steps−1.5) (3) This corresponds to increasing the learning rate linearly for the ﬁrst warmup_steps training steps, and decreasing it", "text_a": "seconds, and the models were trained for 300,000 steps or 3.5 days.", "text_b": "seconds. The big models were trained for 300,000 steps (3.5 days).", "impact": "", "comment": ""}, {"kind": "pagination", "old_page": 7, "new_page": 7, "left": "<del>[18]</del>", "right": "<ins>[20]</ins>", "unified": "<del>[18]</del> <ins>[20]</ins>", "ctx_before": "hyperparameters described throughout the paper, each training step took about 0.4 seconds. We trained the base models for a total of 100,000 steps or 12 hours. For our big models,(described on the bott const $=id=>document.getElementById(id);
const list=$("list"),q=$("q"),pag=$("pag"),ctx=$("ctx"),countEl=$("count");
$("kick").textContent=L.kicker;$("title").innerHTML=L.title;$("subtitle").textContent=L.subtitle;
$("q").placeholder=L.searchPh;$("vSide").textContent=L.viewSide;$("vUni").textContent=L.viewUni;
$("ctxLab").textContent=L.ctxToggle;$("pagLab").textContent=L.pagToggle;$("footer").textContent=L.footer;
$("legend").innerHTML=`<span><del>${L.legendRemoved}</del></span><span><ins>${L.legendAdded}</ins></span>`;
$("editions").innerHTML=`<div class="ed"><b>${L.refLabel}</b>${DATA.meta.ref}</div><div class="ed"><b>${L.cmpLabel}</b>${DATA.meta.cmp}</div>`;
const s=DATA.meta.stats;
$("kpis").innerHTML=`
  <div class="kpi active" data-f=""><div class="val">${DATA.meta.n_content}</div><div class="lab">${L.kpiContent}</div></div>
  <div class="kpi" data-f="changed"><div class="val">${s.changed}</div><div class="lab">${L.kpiChanged}</div></div>
  <div class="kpi add" data-f="added"><div class="val">${s.added}</div><div class="lab">${L.kpiAdded}</div></div>
  <div class="kpi del" data-f="removed"><div class="val">${s.removed}</div><div class="lab">${L.kpiRemoved}</div></div>`;
let kindFilter="";
$("kpis").addEventListener("click",e=>{const c=e.target.closest(".kpi");if(!c)return;const f=c.dataset.f;kindFilter=(kindFilter===f&&f!=="")?"":f;
  document.querySelectorAll(".kpi").forEach(k=>k.classList.toggle("active",kindFilter===""?k.dataset.f==="":k.dataset.f===kindFilter));render();});
const ctxHtml=(t,cls)=>t?`<span class="ctx ${cls}">${cls==="before"?t+" ":" "+t}</span>`:"";
let visible=[];
function render(){
  const term=q.value.trim().toLowerCase(),showPag=pag.checked;list.innerHTML="";visible=[];
  DATA.items.forEach((it,idx)=>{
    if(it.kind==="pagination"&&!showPag)return;
    if(kindFilter&&it.kind!==kindFilter)return;
    if(term&&!(it.left+" "+it.right+" "+it.comment).toLowerCase().includes(term))return;
    visible.push(idx);
    const loc=it.old_page===it.new_page?`${L.pageWord} ${it.new_page}`:`p.${it.old_page} → p.${it.new_page}`;
    const oldSide=it.kind==="added"?`<span class="empty">${L.emptyOld}</span>`:it.left;
    const newSide=it.kind==="removed"?`<span class="empty">${L.emptyNew}</span>`:it.right;
    const imp=it.impact?`<span class="impact ${it.impact}">${L.impacts[it.impact]||it.impact}</span>`:"";
    const note=it.comment?`<div class="note-txt">${it.comment}</div>`:(L.noComment?`<div class="note-txt" style="color:#9aa3b2;font-style:italic">${L.noComment}</div>`:"");
    const el=document.createElement("div");el.className="change";el.id="c"+idx;
    el.innerHTML=`<div class="chead"><span class="num">#${visible.length}</span><span class="badge ${it.kind}">${L.badges[it.kind]}</span>${imp}<span class="loc">${loc}</span></div>
      <div class="cols">
        <div class="col old"><div class="tag">${L.colOld} <b>−</b></div>${ctxHtml(it.ctx_before,"before")}${oldSide}${ctxHtml(it.ctx_after,"after")}</div>
        <div class="col new"><div class="tag">${L.colNew} <b>+</b></div>${ctxHtml(it.ctx_before,"before")}${newSide}${ctxHtml(it.ctx_after,"after")}</div>
        <div class="col note"><div class="tag">${L.commentHead}</div>${imp}${note}</div>
      </div><div class="unified">${it.unified}${note}</div>`;
    list.appendChild(el);
  });
  countEl.textContent=`${visible.length} ${L.shownWord}`;cur=-1;updPos();
}
$("view").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;document.querySelectorAll("#view button").forEach(x=>x.classList.toggle("on",x===b));document.body.classList.toggle("uni",b.dataset.v==="uni");});
q.addEventListener("input",render);pag.addEventListener("change",render);
ctx.addEventListener("change",()=>document.body.classList.toggle("showctx",ctx.checked));
let cur=-1;
function updPos(){$("pos").textContent=visible.length?`${Math.max(cur+1,1)} / ${visible.length}`:"0 / 0";}
function go(d){if(!visible.length)return;cur=(cur+d+visible.length)%visible.length;$("c"+visible[cur]).scrollIntoView({behavior:"smooth",block:"center"});updPos();}
$("next").onclick=()=>go(1);$("prev").onclick=()=>go(-1);
render();
